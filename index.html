<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Pedro ❤️ Manu</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

#controls {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
  color: white;
}

#speed {
  width: 120px;
}

#titulo {
  position: fixed;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 28px;
  color: #ff4da6;
  text-shadow: 0 0 15px #ff4da6;
}

#mensagem {
  position: fixed;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 22px;
  color: #fff;
  text-shadow: 0 0 20px #ff4da6;
}
</style>
</head>

<body>

<div id="titulo">Pedro ❤️ Manu</div>

<div id="controls">
  <button id="btnMusic">▶️ Música</button><br><br>
  Velocidade:<br>
  <input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">
</div>

<div id="mensagem">
Você é a poesia que meu coração sempre quis escrever 💖
</div>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
const scene = new THREE.Scene();

// GALÁXIA
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 2000;
const posArray = new Float32Array(starsCount * 3);

for (let i = 0; i < starsCount * 3; i++) {
  posArray[i] = (Math.random() - 0.5) * 2000;
}

starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

const starsMaterial = new THREE.PointsMaterial({
  size: 1.2,
  color: 0xffffff
});

const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// CÂMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.z = 0;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// FRASES
const palavras = [
"Te amo além do tempo ❤️",
"Você é meu universo 💖",
"Se eu pudesse, te escolheria mil vezes 💕",
"Você é poesia viva 😍",
"Meu coração é seu 💘",
"Manu, você é meu destino ✨",
"Pedro ama você infinitamente 💞",
"Você ilumina minha vida 🌹",
"Nos seus olhos encontrei meu lar 💓",
"Se amar você for sonho, não quero acordar 💗"
];

// SUAS FOTOS (EXATAMENTE COMO NO GITHUB)
const fotos = [
  "foto.png",
  "Screenshot_20260321_045923_Gallery.jpg",
  "Screenshot_20260321_045933_Gallery.jpg",
  "Screenshot_20260321_045941_Gallery.jpg"
];

let sprites = [];
let speed = 1;

// TEXTO
function createText() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 512;
  canvas.height = 256;

  ctx.fillStyle = "#ff4da6";
  ctx.font = "bold 40px Arial";
  ctx.shadowColor = "#ff4da6";
  ctx.shadowBlur = 20;

  ctx.fillText(
    palavras[Math.floor(Math.random()*palavras.length)],
    50,
    120
  );

  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture, transparent:true });

  const sprite = new THREE.Sprite(material);

  sprite.position.set(
    (Math.random()-0.5)*15,
    (Math.random()-0.5)*8,
    -2000
  );

  sprite.scale.set(8,4,1);

  scene.add(sprite);
  sprites.push(sprite);
}

// FOTO
function createPhoto() {
  const texture = new THREE.TextureLoader().load(
    fotos[Math.floor(Math.random()*fotos.length)]
  );

  const material = new THREE.SpriteMaterial({ map:texture, transparent:true });
  const sprite = new THREE.Sprite(material);

  sprite.position.set(
    (Math.random()-0.5)*15,
    (Math.random()-0.5)*8,
    -2000
  );

  sprite.scale.set(6,6,1);

  scene.add(sprite);
  sprites.push(sprite);
}

// INTERVALO
setInterval(()=>{
  createText();
  createPhoto();
},1500);

// ANIMAÇÃO
function animate(){
  requestAnimationFrame(animate);

  stars.rotation.y += 0.0005;

  sprites.forEach((s,i)=>{
    s.position.z += 1 * speed;

    if(s.position.z > 200){
      scene.remove(s);
      sprites.splice(i,1);
    }
  });

  renderer.render(scene,camera);
}
animate();

// VELOCIDADE
document.getElementById("speed").oninput = (e)=>{
  speed = e.target.value;
};

// MÚSICA
const music = document.getElementById("music");
document.getElementById("btnMusic").onclick = ()=>{
  if(music.paused){
    music.play();
  }else{
    music.pause();
  }
};

// RESPONSIVO
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
