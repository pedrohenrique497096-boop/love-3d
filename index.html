<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedro ❤️ Manu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background:
        radial-gradient(circle at top, #3b0a2a 0%, #160511 45%, #000 100%);
      font-family: Arial, sans-serif;
      height: 100vh;
      color: white;
    }

    #scene {
      position: fixed;
      inset: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .top-message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #ffd1e6;
      text-shadow: 0 0 12px #ff4da6;
      z-index: 20;
      pointer-events: none;
      padding: 0 16px;
    }

    .top-message h1 {
      font-size: clamp(28px, 6vw, 54px);
      margin-bottom: 8px;
    }

    .top-message p {
      font-size: clamp(14px, 3vw, 22px);
      opacity: 0.95;
    }

    .bottom-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 800px);
      text-align: center;
      color: #fff;
      text-shadow: 0 0 10px #ff4da6;
      font-size: clamp(16px, 3.6vw, 28px);
      z-index: 20;
      animation: glow 2.5s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes glow {
      from { opacity: 0.7; transform: translateX(-50%) scale(1); }
      to   { opacity: 1; transform: translateX(-50%) scale(1.03); }
    }

    .controls {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 30;
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      background: rgba(255, 77, 166, 0.85);
      color: white;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 0 14px rgba(255, 77, 166, 0.45);
    }

    .start-screen {
      position: fixed;
      inset: 0;
      z-index: 40;
      background:
        radial-gradient(circle at center, rgba(255, 77, 166, 0.18), rgba(0,0,0,0.92));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .start-card {
      background: rgba(20, 5, 17, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 0 25px rgba(255, 77, 166, 0.2);
      border-radius: 22px;
      padding: 26px 20px;
      width: min(92vw, 420px);
      backdrop-filter: blur(5px);
    }

    .start-card h2 {
      color: #ff8fc4;
      margin-bottom: 12px;
      font-size: 30px;
      text-shadow: 0 0 12px #ff4da6;
    }

    .start-card p {
      color: #ffe8f3;
      line-height: 1.5;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .start-card .start-btn {
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 14px;
      background: linear-gradient(45deg, #ff2f92, #ff6ab3);
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      opacity: 0.8;
      color: #ffd6ea;
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="overlay">
    <div class="top-message">
      <h1>Pedro ❤️ Manu</h1>
      <p>Um pedacinho do meu coração feito pra você</p>
    </div>

    <div class="bottom-message">
      Manu, desde que você entrou na minha vida, tudo ficou mais bonito.  
      Com amor, Pedro 💖
    </div>
  </div>

  <div class="controls">
    <button id="musicBtn">▶️ Música</button>
  </div>

  <div class="start-screen" id="startScreen">
    <div class="start-card">
      <h2>Para Manu 💗</h2>
      <p>
        Eu preparei isso com carinho.<br>
        Toca no botão abaixo para começar.
      </p>
      <button class="start-btn" id="startBtn">Abrir surpresa</button>
      <div class="hint">A música começa depois do toque.</div>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    const canvas = document.getElementById("scene");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      70,
      window.innerWidth / window.innerHeight,
      0.1,
      4000
    );
    camera.position.z = 25;

    const light = new THREE.PointLight(0xff77bb, 2.5, 1000);
    light.position.set(0, 8, 20);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const words = [
      "Te amo ❤️",
      "Meu amor 💖",
      "Minha vida 💕",
      "Você é especial ✨",
      "Linda 💗",
      "Manu ❤️",
      "Pedro ama você 💘",
      "Para sempre 💞",
      "Meu coração é seu 💓"
    ];

    const floatingItems = [];
    const loader = new THREE.TextureLoader();

    function makeWordSprite(text) {
      const c = document.createElement("canvas");
      c.width = 1024;
      c.height = 256;
      const ctx = c.getContext("2d");

      ctx.clearRect(0, 0, c.width, c.height);
      ctx.font = "bold 68px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.shadowColor = "#ff4da6";
      ctx.shadowBlur = 18;
      ctx.fillStyle = "#ffd6ea";
      ctx.fillText(text, c.width / 2, c.height / 2);

      const texture = new THREE.CanvasTexture(c);
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(18, 4.5, 1);
      return sprite;
    }

    function createWord() {
      const text = words[Math.floor(Math.random() * words.length)];
      const sprite = makeWordSprite(text);

      sprite.position.set(
        (Math.random() - 0.5) * 34,
        (Math.random() - 0.5) * 18,
        -260
      );

      sprite.userData = {
        speed: 0.22 + Math.random() * 0.08,
        type: "word"
      };

      scene.add(sprite);
      floatingItems.push(sprite);
    }

    let photoTexture = null;

    function loadPhoto() {
      loader.load(
        "foto.png",
        (texture) => {
          photoTexture = texture;
          createMainPhoto();
        },
        undefined,
        () => {
          console.log("foto.png não encontrada ou não carregou");
        }
      );
    }

    function createMainPhoto() {
      if (!photoTexture) return;

      const material = new THREE.SpriteMaterial({
        map: photoTexture,
        transparent: true
      });

      const sprite = new THREE.Sprite(material);
      sprite.position.set(0, 0, -190);
      sprite.scale.set(14, 14, 1);
      sprite.userData = {
        speed: 0.18,
        type: "photo-main"
      };

      scene.add(sprite);
      floatingItems.push(sprite);
    }

    function createFloatingPhoto() {
      if (!photoTexture) return;

      const material = new THREE.SpriteMaterial({
        map: photoTexture,
        transparent: true,
        opacity: 0.9
      });

      const sprite = new THREE.Sprite(material);
      sprite.position.set(
        (Math.random() - 0.5) * 24,
        (Math.random() - 0.5) * 14,
        -300
      );

      const size = 5 + Math.random() * 2.5;
      sprite.scale.set(size, size, 1);

      sprite.userData = {
        speed: 0.16 + Math.random() * 0.05,
        driftX: (Math.random() - 0.5) * 0.01,
        driftY: (Math.random() - 0.5) * 0.01,
        type: "photo-float"
      };

      scene.add(sprite);
      floatingItems.push(sprite);
    }

    function makeHeartSprite() {
      const c = document.createElement("canvas");
      c.width = 256;
      c.height = 256;
      const ctx = c.getContext("2d");

      ctx.font = "140px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "#ff4da6";
      ctx.shadowBlur = 18;
      ctx.fillText("❤️", 128, 128);

      const texture = new THREE.CanvasTexture(c);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.position.set(0, 8, -120);
      sprite.scale.set(7, 7, 1);
      return sprite;
    }

    const heart = makeHeartSprite();
    scene.add(heart);

    let heartPulse = 0;

    let wordInterval;
    let photoInterval;

    function startAnimations() {
      wordInterval = setInterval(() => {
        createWord();
      }, 2200);

      photoInterval = setInterval(() => {
        createFloatingPhoto();
      }, 5200);
    }

    function animate() {
      requestAnimationFrame(animate);

      heartPulse += 0.045;
      const pulse = 7 + Math.sin(heartPulse) * 0.4;
      heart.scale.set(pulse, pulse, 1);

      for (let i = floatingItems.length - 1; i >= 0; i--) {
        const item = floatingItems[i];
        item.position.z += item.userData.speed || 0.2;

        if (item.userData.driftX) item.position.x += item.userData.driftX;
        if (item.userData.driftY) item.position.y += item.userData.driftY;

        if (item.userData.type === "photo-main") {
          item.rotation += 0.0015;
        }

        if (item.position.z > 60) {
          scene.remove(item);
          if (item.material.map) item.material.map.dispose?.();
          item.material.dispose?.();
          floatingItems.splice(i, 1);

          if (item.userData.type === "photo-main") {
            setTimeout(createMainPhoto, 2500);
          }
        }
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    const music = document.getElementById("bgMusic");
    const musicBtn = document.getElementById("musicBtn");
    const startBtn = document.getElementById("startBtn");
    const startScreen = document.getElementById("startScreen");

    musicBtn.addEventListener("click", async () => {
      try {
        if (music.paused) {
          await music.play();
          musicBtn.textContent = "⏸️ Pausar";
        } else {
          music.pause();
          musicBtn.textContent = "▶️ Música";
        }
      } catch (e) {
        console.log("Não foi possível tocar a música:", e);
      }
    });

    startBtn.addEventListener("click", async () => {
      startScreen.style.display = "none";
      loadPhoto();
      startAnimations();

      try {
        await music.play();
        musicBtn.textContent = "⏸️ Pausar";
      } catch (e) {
        console.log("Música bloqueada até interação:", e);
      }
    });
  </script>
</body>
</html>
