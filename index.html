<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Pedro ❤️ Manu</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* START */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:20;
  color:white;
}

#startBtn{
  padding:15px 30px;
  font-size:20px;
  background:#ff4da6;
  border:none;
  border-radius:12px;
}

/* CARTA */
#carta{
  position:fixed;
  top:30%;
  width:100%;
  text-align:center;
  font-size:22px;
  color:#fff;
  text-shadow:0 0 15px #ff4da6;
}

/* CONTROLES */
#controls{
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:18px;
}

#speed{
  width:90%;
  height:25px;
  accent-color:#ff4da6;
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>Para Manu 💖</h2>
  <button id="startBtn">Abrir surpresa</button>
</div>

<div id="carta"></div>

<div id="controls">
  Velocidade<br>
  <input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">
</div>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
const scene = new THREE.Scene();

// GALÁXIA
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 4000;
const posArray = new Float32Array(starsCount*3);

for(let i=0;i<starsCount*3;i++){
  posArray[i]=(Math.random()-0.5)*2000;
}

starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray,3));
const starsMaterial = new THREE.PointsMaterial({size:1,color:0xffffff});
const stars = new THREE.Points(starsGeometry,starsMaterial);
scene.add(stars);

// CÂMERA
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,5000);
camera.position.z=0;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// FOTOS
const fotos=[
"foto.png",
"Screenshot_20260321_045923_Gallery.jpg",
"Screenshot_20260321_045933_Gallery.jpg",
"Screenshot_20260321_045941_Gallery.jpg"
];

let sprites=[];
let speed=1;

// CRIAR FOTO EM POSIÇÃO ESPECÍFICA
function createPhotoAt(x,y){

  const loader=new THREE.TextureLoader();

  loader.load(
    fotos[Math.floor(Math.random()*fotos.length)],

    function(texture){

      const material=new THREE.SpriteMaterial({map:texture});
      const sprite=new THREE.Sprite(material);

      const ratio = texture.image.width / texture.image.height || 1;
      sprite.scale.set(5*ratio,5,1);

      // começa fora da tela (zoom cinema)
      sprite.position.set(x*3,y*3,-100);

      sprite.userData={
        targetX:x,
        targetY:y,
        progress:0
      };

      scene.add(sprite);
      sprites.push(sprite);
    }
  );
}

// SEQUÊNCIA BONITA
const sequencia = [1,3,5,2,3,1,4,2];
let indexSeq = 0;

function spawnGrupo(){

  const qtd = sequencia[indexSeq];

  if(qtd === 1){
    createPhotoAt(0,0);
  }

  if(qtd === 2){
    createPhotoAt(-3,0);
    createPhotoAt(3,0);
  }

  if(qtd === 3){
    createPhotoAt(-4,0);
    createPhotoAt(0,0);
    createPhotoAt(4,0);
  }

  if(qtd === 4){
    createPhotoAt(-3,2);
    createPhotoAt(3,2);
    createPhotoAt(-3,-2);
    createPhotoAt(3,-2);
  }

  if(qtd === 5){
    createPhotoAt(-4,2);
    createPhotoAt(4,2);
    createPhotoAt(0,0);
    createPhotoAt(-4,-2);
    createPhotoAt(4,-2);
  }

  indexSeq++;
  if(indexSeq >= sequencia.length){
    indexSeq = 0;
  }
}

// LOOP
function startAnimation(){
  setInterval(()=>{
    spawnGrupo();
  },3000);
}

// ANIMAÇÃO SUAVE
function animate(){
  requestAnimationFrame(animate);

  stars.rotation.y+=0.0005;

  sprites.forEach((s,i)=>{

    if(s.userData.progress !== undefined){

      s.userData.progress += 0.02 * speed;

      let t = s.userData.progress;
      t = 1 - Math.pow(1 - t, 3);

      s.position.x = (1 - t) * s.position.x + t * s.userData.targetX;
      s.position.y = (1 - t) * s.position.y + t * s.userData.targetY;

      if(s.userData.progress >= 1){
        s.userData.progress = undefined;
      }

    } else {
      s.position.z += 0.6 * speed;
    }

    if(s.position.z > 50){
      scene.remove(s);
      sprites.splice(i,1);
    }

  });

  renderer.render(scene,camera);
}
animate();

// VELOCIDADE
document.getElementById("speed").oninput=(e)=>{
  speed=e.target.value;
};

// START
document.getElementById("startBtn").onclick=()=>{
  document.getElementById("startScreen").style.display="none";
  document.getElementById("music").play();
  startAnimation();
};
</script>

</body>
</html>
