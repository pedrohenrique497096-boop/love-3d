<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Pedro ❤️ Manu</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

/* BOTÃO INICIAR */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(#ff4da6, black);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  color: white;
  flex-direction: column;
}

#startBtn {
  padding: 15px 25px;
  font-size: 18px;
  background: #ff4da6;
  border: none;
  border-radius: 10px;
}

/* NOME CENTRAL */
#nome {
  position: fixed;
  top: 40%;
  width: 100%;
  text-align: center;
  font-size: 60px;
  color: #ff4da6;
  text-shadow: 0 0 20px #ff4da6;
  opacity: 0;
}

/* VELOCIDADE */
#controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  z-index: 10;
  color: white;
}

#speed {
  width: 250px;
}

/* FRASE */
#mensagem {
  position: fixed;
  bottom: 80px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
  text-shadow: 0 0 10px #ff4da6;
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>Para Manu 💖</h2>
  <button id="startBtn">Abrir surpresa</button>
</div>

<div id="nome">Pedro ❤️ Manu</div>

<div id="mensagem">
Você é tudo pra mim 💖
</div>

<div id="controls">
  Velocidade<br>
  <input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">
</div>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
const scene = new THREE.Scene();

// GALÁXIA
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 2000;
const posArray = new Float32Array(starsCount * 3);

for (let i = 0; i < starsCount * 3; i++) {
  posArray[i] = (Math.random() - 0.5) * 2000;
}

starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

const starsMaterial = new THREE.PointsMaterial({ size: 1.2, color: 0xffffff });
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// CÂMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.z = 0;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// FRASES
const palavras = [
"Te amo ❤️","Você é meu universo 💖","Meu amor 💕","Minha vida 😍",
"Para sempre 💘","Manu 💖","Pedro ama você 💞"
];

// FOTOS (SEUS NOMES)
const fotos = [
"foto.png",
"Screenshot_20260321_045923_Gallery.jpg",
"Screenshot_20260321_045933_Gallery.jpg",
"Screenshot_20260321_045941_Gallery.jpg"
];

let sprites = [];
let speed = 1;

// TEXTO
function createText() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 512;
  canvas.height = 256;

  ctx.fillStyle = "#ff4da6";
  ctx.font = "bold 40px Arial";
  ctx.shadowColor = "#ff4da6";
  ctx.shadowBlur = 20;

  ctx.fillText(palavras[Math.floor(Math.random()*palavras.length)], 50,120);

  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture });

  const sprite = new THREE.Sprite(material);

  sprite.position.set((Math.random()-0.5)*15,(Math.random()-0.5)*8,-2000);
  sprite.scale.set(8,4,1);

  scene.add(sprite);
  sprites.push(sprite);
}

// FOTO
function createPhoto() {
  const texture = new THREE.TextureLoader().load(
    fotos[Math.floor(Math.random()*fotos.length)]
  );

  const material = new THREE.SpriteMaterial({ map:texture });
  const sprite = new THREE.Sprite(material);

  sprite.position.set((Math.random()-0.5)*15,(Math.random()-0.5)*8,-2000);
  sprite.scale.set(6,6,1);

  scene.add(sprite);
  sprites.push(sprite);
}

// INTERVALO
function startAnimation(){
  setInterval(()=>{
    createText();
    createPhoto();
  },1500);
}

// ANIMAÇÃO
function animate(){
  requestAnimationFrame(animate);

  stars.rotation.y += 0.0005;

  sprites.forEach((s,i)=>{
    s.position.z += 1 * speed;

    if(s.position.z > 200){
      scene.remove(s);
      sprites.splice(i,1);
    }
  });

  renderer.render(scene,camera);
}
animate();

// VELOCIDADE
document.getElementById("speed").oninput = (e)=>{
  speed = e.target.value;
};

// ANIMAÇÃO DO NOME
function animarNome(){
  const nome = document.getElementById("nome");
  nome.style.opacity = 1;
  nome.style.transform = "scale(0.5)";

  setTimeout(()=>{
    nome.style.transition = "1.5s";
    nome.style.transform = "scale(1.5)";
  },100);

  setTimeout(()=>{
    nome.style.transform = "translateX(-300px)";
  },2500);
}

// INICIAR
document.getElementById("startBtn").onclick = ()=>{
  document.getElementById("startScreen").style.display = "none";

  document.getElementById("music").play();

  animarNome();
  startAnimation();
};
</script>

</body>
</html>
