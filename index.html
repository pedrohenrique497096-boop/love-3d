<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Pedro ❤️ Manu</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* START */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:20;
  color:white;
}

#startBtn{
  padding:15px 30px;
  font-size:20px;
  background:#ff4da6;
  border:none;
  border-radius:12px;
}

/* CARTA */
#carta{
  position:fixed;
  top:30%;
  width:100%;
  text-align:center;
  font-size:22px;
  color:#fff;
  text-shadow:0 0 15px #ff4da6;
}

/* CONTROLES */
#controls{
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:18px;
}

#speed{
  width:90%;
  height:25px;
  accent-color:#ff4da6;
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>Para Manu 💖</h2>
  <button id="startBtn">Abrir surpresa</button>
</div>

<div id="carta"></div>

<div id="controls">
  Velocidade<br>
  <input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">
</div>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
const scene = new THREE.Scene();

// GALÁXIA
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 4000;
const posArray = new Float32Array(starsCount*3);

for(let i=0;i<starsCount*3;i++){
  posArray[i]=(Math.random()-0.5)*2000;
}

starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray,3));
const starsMaterial = new THREE.PointsMaterial({size:1,color:0xffffff});
const stars = new THREE.Points(starsGeometry,starsMaterial);
scene.add(stars);

// CÂMERA
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,5000);
camera.position.z=0;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// FRASES
const frases=[
"Manu...",
"Desde que você entrou na minha vida...",
"tudo ganhou cor...",
"tudo ganhou sentido...",
"Você é meu sonho que virou realidade...",
"Meu coração escolheu você...",
"e escolheria mil vezes...",
"em qualquer vida...",
"em qualquer universo...",
"Te amo ❤️"
];

// FOTOS (SEUS NOMES)
const fotos=[
"foto.png",
"Screenshot_20260321_045923_Gallery.jpg",
"Screenshot_20260321_045933_Gallery.jpg",
"Screenshot_20260321_045941_Gallery.jpg"
];

let sprites=[];
let speed=1;

// TEXTO
function createText(){
  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width=512;
  canvas.height=256;

  ctx.fillStyle="#ff4da6";
  ctx.font="bold 40px Arial";
  ctx.shadowColor="#ff4da6";
  ctx.shadowBlur=20;

  ctx.fillText("Te amo ❤️",50,120);

  const texture=new THREE.CanvasTexture(canvas);
  const material=new THREE.SpriteMaterial({map:texture});

  const sprite=new THREE.Sprite(material);

  sprite.position.set((Math.random()-0.5)*15,(Math.random()-0.5)*8,-2000);
  sprite.scale.set(8,4,1);

  scene.add(sprite);
  sprites.push(sprite);
}

// FOTO (CORRIGIDO)
function createPhoto(){
  const loader=new THREE.TextureLoader();

  loader.load(
    fotos[Math.floor(Math.random()*fotos.length)],

    function(texture){
      const material=new THREE.SpriteMaterial({map:texture});
      const sprite=new THREE.Sprite(material);

      const ratio = texture.image.width / texture.image.height || 1;
      sprite.scale.set(6*ratio,6,1);

      sprite.position.set(
        (Math.random()-0.5)*15,
        (Math.random()-0.5)*8,
        -2000
      );

      scene.add(sprite);
      sprites.push(sprite);
    }
  );
}

// CORAÇÃO
function createHeart(){
  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width=200;
  canvas.height=200;

  ctx.font="80px Arial";
  ctx.fillText("❤️",50,120);

  const texture=new THREE.CanvasTexture(canvas);
  const material=new THREE.SpriteMaterial({map:texture});
  const sprite=new THREE.Sprite(material);

  sprite.scale.set(2.5,2.5,1);

  sprite.position.set((Math.random()-0.5)*15,(Math.random()-0.5)*8,-2000);

  scene.add(sprite);
  sprites.push(sprite);
}

// LOOP
function startAnimation(){
  setInterval(()=>{
    createPhoto();
    createHeart();
    createText();
  },2000);
}

// ANIMAÇÃO
function animate(){
  requestAnimationFrame(animate);

  stars.rotation.y+=0.0005;
  camera.position.z -= 0.02;

  sprites.forEach((s,i)=>{
    s.position.z+=0.8*speed;

    if(s.position.z>200){
      scene.remove(s);
      sprites.splice(i,1);
    }
  });

  renderer.render(scene,camera);
}
animate();

// VELOCIDADE
document.getElementById("speed").oninput=(e)=>{
  speed=e.target.value;
};

// CARTA
let i=0;
function escrever(){
  if(i<frases.length){
    document.getElementById("carta").innerHTML += frases[i]+"<br>";
    i++;
    setTimeout(escrever,2000);
  }
}

// START
document.getElementById("startBtn").onclick=()=>{
  document.getElementById("startScreen").style.display="none";
  document.getElementById("music").play();

  escrever();
  startAnimation();
};
</script>

</body>
</html>
