<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>LOVE 3D FINAL</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
canvas {
  display: block;
}

#btnMusic {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
  background: rgba(255,0,128,0.7);
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="btnMusic">▶️ Música</button>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
const scene = new THREE.Scene();

// CÂMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  5000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ
const light = new THREE.PointLight(0xff0080, 3);
light.position.set(0, 0, 50);
scene.add(light);

// ===== TÚNEL =====
const tunnelGeometry = new THREE.CylinderGeometry(20, 20, 2000, 32, 1, true);
const tunnelMaterial = new THREE.MeshBasicMaterial({
  color: 0xff0077,
  wireframe: true,
  transparent: true,
  opacity: 0.15
});
const tunnel = new THREE.Mesh(tunnelGeometry, tunnelMaterial);
tunnel.rotation.x = Math.PI / 2;
scene.add(tunnel);

// ===== PARTÍCULAS =====
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 1500;
const posArray = new Float32Array(particlesCount * 3);

for (let i = 0; i < particlesCount * 3; i++) {
  posArray[i] = (Math.random() - 0.5) * 2000;
}

particlesGeometry.setAttribute(
  "position",
  new THREE.BufferAttribute(posArray, 3)
);

const particlesMaterial = new THREE.PointsMaterial({
  size: 1.5,
  color: 0xff4da6
});

const particlesMesh = new THREE.Points(
  particlesGeometry,
  particlesMaterial
);

scene.add(particlesMesh);

// ===== TEXTOS =====
const texts = [
  "TE AMO ❤️",
  "MEU AMOR 💖",
  "PARA SEMPRE 💕",
  "VOCÊ É TUDO 💘",
  "MINHA VIDA 😍"
];

// ===== 5 FOTOS =====
const imagens = [
  "foto1.png",
  "foto2.png",
  "foto3.png",
  "foto4.png",
  "foto5.png"
];

let sprites = [];

// TEXTO
function createText() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 512;
  canvas.height = 256;

  ctx.fillStyle = "#ff4da6";
  ctx.font = "bold 48px Arial";
  ctx.shadowColor = "#ff4da6";
  ctx.shadowBlur = 20;

  ctx.fillText(
    texts[Math.floor(Math.random() * texts.length)],
    50,
    120
  );

  const texture = new THREE.CanvasTexture(canvas);

  const material = new THREE.SpriteMaterial({
    map: texture,
    transparent: true
  });

  const sprite = new THREE.Sprite(material);

  sprite.position.set(
    (Math.random() - 0.5) * 20,
    (Math.random() - 0.5) * 10,
    -2500
  );

  sprite.scale.set(10, 5, 1);

  scene.add(sprite);
  sprites.push(sprite);
}

// IMAGEM
function createImage() {
  const texture = new THREE.TextureLoader().load(
    imagens[Math.floor(Math.random() * imagens.length)]
  );

  const material = new THREE.SpriteMaterial({
    map: texture,
    transparent: true
  });

  const sprite = new THREE.Sprite(material);

  sprite.position.set(
    (Math.random() - 0.5) * 20,
    (Math.random() - 0.5) * 10,
    -2500
  );

  sprite.scale.set(6, 6, 1);

  scene.add(sprite);
  sprites.push(sprite);
}

// 🎯 PROPORÇÃO: MAIS FOTOS QUE TEXTO
setInterval(() => {
  createImage();
  createImage();
  createImage(); // 3 fotos
  createText();  // 1 texto
}, 1500);

// CÂMERA
camera.position.z = 0;

// ANIMAÇÃO (SUPER LENTO)
function animate() {
  requestAnimationFrame(animate);

  tunnel.rotation.z += 0.0008;
  particlesMesh.rotation.y += 0.0002;

  sprites.forEach((s, i) => {
    s.position.z += 0.8;

    if (s.position.z > 200) {
      scene.remove(s);
      sprites.splice(i, 1);
    }
  });

  renderer.render(scene, camera);
}

animate();

// MÚSICA
const music = document.getElementById("music");
const btn = document.getElementById("btnMusic");

btn.onclick = () => {
  if (music.paused) {
    music.play();
    btn.innerText = "⏸️ Pausar";
  } else {
    music.pause();
    btn.innerText = "▶️ Música";
  }
};

// RESPONSIVO
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
